  <script src="https://www.gstatic.com/firebasejs/10.7.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.2/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/articles.js"></script>
  <script src="js/main.js"></script>
  <script src="js/theme.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async function () {
      if (typeof loadFirebaseArticlesIfAvailable === 'function') await loadFirebaseArticlesIfAvailable();
      const params = new URLSearchParams(window.location.search);
      const idParam = params.get('id');
      if (!idParam) {
        document.getElementById('articleContent').innerHTML = '<a href="articles.html" class="back-link">← Back to Articles</a><p>Article not found.</p>';
        return;
      }
      const article = loadArticles().find(a => String(a.id) === idParam);
      if (article) {
        localStorage.setItem('last_article_id', article.id);
        document.title = article.title + ' - Neptune Privacy';
        displayArticle(article);
      } else {
        document.getElementById('articleContent').innerHTML = '<a href="articles.html" class="back-link">← Back to Articles</a><p>Article not found.</p>';
      }
    });
  </script>
</body>

</html>
