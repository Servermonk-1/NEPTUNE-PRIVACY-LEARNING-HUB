<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article - Neptune Privacy</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="header-container">
      <a href="index.html" class="logo">Neptune Privacy</a>
      <nav>
        <button id="navToggle" class="nav-toggle" aria-label="Open navigation">
          <span></span><span></span><span></span>
        </button>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="articles.html">Articles</a></li>
          <li><a href="videos.html">Videos</a></li>
          <li><a href="features.html">Features</a></li>
          <li><a href="learn.html">Learn</a></li>
          <li><a href="quiz.html">Quiz</a></li>
          <li><a href="roadmap.html">Roadmap</a></li>
          <li><a href="about.html">About</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main id="articleContent">
    <p class="text-muted">Loading article…</p>
  </main>

  <footer>
    <p><strong>Neptune Privacy</strong> — "Privacy Unchained"</p>
    <div class="footer-links">
      <a href="https://twitter.com/NeptunePrivacy" target="_blank">Twitter</a>
      <a href="https://github.com/neptune-privacy" target="_blank">GitHub</a>
      <a href="articles.html">Back to Articles</a>
    </div>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/10.7.2/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.2/firebase-firestore.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/articles.js"></script>
  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async function() {
      if (typeof loadFirebaseArticlesIfAvailable === 'function') await loadFirebaseArticlesIfAvailable();
      const params = new URLSearchParams(window.location.search);
      const idParam = params.get('id');
      if (!idParam) {
        document.getElementById('articleContent').innerHTML = '<a href="articles.html" class="back-link">← Back to Articles</a><p>Article not found.</p>';
        return;
      }
      const article = loadArticles().find(a => String(a.id) === idParam);
      if (article) {
        document.title = article.title + ' - Neptune Privacy';
        displayArticle(article);
      } else {
        document.getElementById('articleContent').innerHTML = '<a href="articles.html" class="back-link">← Back to Articles</a><p>Article not found.</p>';
      }
    });
  </script>
</body>
</html>
